<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gauss's Law Symmetry Explorer — VR</title>
  <style>

    #status-bar { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-family: 'Rajdhani', sans-serif; font-size: 14px; color: #7a9bb5; text-align: center; pointer-events: none; z-index: 10; }

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/" } }
  </script>
</head>
<body>
<div id="info">
  <div class="title">GAUSS'S LAW — SYMMETRY EXPLORER</div>
  <div class="sub">Choose a charge distribution and Gaussian surface. Drag the surface to find where E is constant.</div>
</div>
<div id="status-bar"></div>
<div id="desktop-panel">
  <div class="btn-group">
    <span class="btn-label">Charge</span>
    <button onclick="selectDistribution('point')" id="btn-point">⊕ Point</button>
    <button onclick="selectDistribution('line')" id="btn-line">∣ Line</button>
  </div>
  <div class="btn-group">
    <span class="btn-label">Surface</span>
    <button onclick="selectSurface('sphere')" id="btn-sphere">◯ Sphere</button>
    <button onclick="selectSurface('cylPar')" id="btn-cylPar">⊞ Cyl ∥</button>
    <button onclick="selectSurface('cylPerp')" id="btn-cylPerp">⊞ Cyl ⊥</button>
  </div>

    <button onclick="resetSurfacePosition()" id="btn-reset">↺ Reset</button>
  </div>
</div>
<div id="vr-button-container"></div>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const CONFIG = {
  bgColor: 0x0a0e1a, gridColor: 0x1a2a3a, gridHighlight: 0x1e3348,
  cyan: 0x5ce0d2, amber: 0xf0a030, green: 0x40e080, red: 0xff3040,
  chargeOrigin: new THREE.Vector3(0, 1.3, -1.8),
  sphereRadius: 0.5,
  cylinderRadius: 0.35,
  cylinderHeight: 1.2,
  // Tile settings
  tileSize: 0.035,          // side length of each square tile
  sphereTileCount: 40,      // Fibonacci samples on sphere (plus 2 poles)
  cylBarrelRings: 4,        // rings of tiles on barrel
  cylBarrelPerRing: 12,     // tiles per ring
  cylCapTiles: 6,           // tiles per endcap (in a ring)
  cylCapRingRadius: 0.65,   // fraction of radius for endcap tile ring
  // Arrow appearance
  arrowMinLength: 0.02,
  arrowMaxLength: 0.40,
  arrowHeadFraction: 0.3,
  arrowHeadWidthFraction: 0.5,
  // Uniformity
  uniformityThreshold: 0.08,
};

// ═══ SCENE ═══
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.bgColor);
scene.fog = new THREE.FogExp2(CONFIG.bgColor, 0.06);
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.6, 0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.xr.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);
document.getElementById('vr-button-container').appendChild(VRButton.createButton(renderer));
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.target.set(0, 1.3, -1.8);
orbitControls.enableDamping = true; orbitControls.dampingFactor = 0.08; orbitControls.update();
scene.add(new THREE.AmbientLight(0x334466, 0.6));
const dirLight = new THREE.DirectionalLight(0xaabbcc, 0.8);
dirLight.position.set(2, 4, 1); scene.add(dirLight);
const ptLight = new THREE.PointLight(CONFIG.cyan, 0.4, 10);
ptLight.position.set(0, 2.5, -1.5); scene.add(ptLight);

// ═══ ENVIRONMENT ═══
const grid = new THREE.GridHelper(20, 40, CONFIG.gridHighlight, CONFIG.gridColor);
grid.material.opacity = 0.4; grid.material.transparent = true; scene.add(grid);
function mkAxis(dir, color, len) {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), dir.clone().multiplyScalar(len)]);
  return new THREE.Line(g, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 }));
}
const axes = new THREE.Group();
axes.add(mkAxis(new THREE.Vector3(1,0,0), 0xff4444, 3));
axes.add(mkAxis(new THREE.Vector3(0,1,0), 0x44ff44, 3));
axes.add(mkAxis(new THREE.Vector3(0,0,1), 0x4444ff, 3));
axes.position.copy(CONFIG.chargeOrigin).setY(0); scene.add(axes);

// ═══ STATE ═══
const state = { distribution: null, surface: null, surfaceOffset: new THREE.Vector3(0.6, 0.3, 0.4), isUniform: false };
const distributionGroup = new THREE.Group(); scene.add(distributionGroup);
const surfaceGroup = new THREE.Group(); scene.add(surfaceGroup);
const arrowGroup = new THREE.Group(); scene.add(arrowGroup);

// ═══ LABELS ═══
function makePanelLabel(text, color, fontSize) {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 128;
  const ctx = c.getContext('2d'); ctx.font = 'bold ' + ((fontSize||24)*2) + 'px Share Tech Mono, monospace';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 512, 64);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  return new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.03),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false, depthTest: false }));
}
function makeSceneLabel(text, color, fontSize) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const ctx = c.getContext('2d'); ctx.font = (fontSize||32) + 'px Share Tech Mono, monospace';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  const m = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.075),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false }));
  m.name = 'sceneLabel'; return m;
}

// ═══ CHARGE DISTRIBUTIONS ═══
function clearDistribution() {
  while (distributionGroup.children.length) {
    const ch = distributionGroup.children[0];
    ch.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); } });
    distributionGroup.remove(ch);
  }
}
function createPointCharge() {
  clearDistribution();
  const o = CONFIG.chargeOrigin;
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 32, 32),
    new THREE.MeshStandardMaterial({ color: CONFIG.red, emissive: CONFIG.red, emissiveIntensity: 0.5 }));
  mesh.position.copy(o); distributionGroup.add(mesh);
  // + sign
  const pc = document.createElement('canvas'); pc.width = 64; pc.height = 64;
  const px = pc.getContext('2d'); px.font = 'bold 48px Share Tech Mono'; px.fillStyle = '#fff';
  px.textAlign = 'center'; px.textBaseline = 'middle'; px.fillText('+', 32, 30);
  const pt = new THREE.CanvasTexture(pc); pt.minFilter = THREE.LinearFilter;
  const pm = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.08),
    new THREE.MeshBasicMaterial({ map: pt, transparent: true, side: THREE.DoubleSide, depthWrite: false }));
  pm.position.copy(o).add(new THREE.Vector3(0, 0, 0.065)); pm.name = 'sceneLabel';
  distributionGroup.add(pm);
  const lbl = makeSceneLabel('+Q', CONFIG.red);
  lbl.position.copy(o).add(new THREE.Vector3(0, 0.14, 0)); distributionGroup.add(lbl);
}
function createLineCharge() {
  clearDistribution();
  const len = 6, o = CONFIG.chargeOrigin;
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, len, 12),
    new THREE.MeshStandardMaterial({ color: CONFIG.amber, emissive: CONFIG.amber, emissiveIntensity: 0.5 }));
  mesh.position.copy(o); distributionGroup.add(mesh);
  const aMat = new THREE.MeshStandardMaterial({ color: CONFIG.amber, emissive: CONFIG.amber, emissiveIntensity: 0.4 });
  const top = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.12, 8), aMat);
  top.position.set(o.x, o.y + len/2 + 0.06, o.z); distributionGroup.add(top);
  const bot = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.12, 8), aMat.clone());
  bot.position.set(o.x, o.y - len/2 - 0.06, o.z); bot.rotation.z = Math.PI; distributionGroup.add(bot);
  const lbl = makeSceneLabel('\u03BB (infinite)', CONFIG.amber);
  lbl.scale.set(1.6, 1.6, 1); lbl.position.set(o.x + 0.2, o.y + 1.5, o.z); distributionGroup.add(lbl);
}

// ═══ PATCH-BASED GAUSSIAN SURFACES ═══
let surfaceMesh = null; // invisible interaction mesh for raycasting

function clearSurface() {
  while (surfaceGroup.children.length) {
    const ch = surfaceGroup.children[0];
    ch.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    surfaceGroup.remove(ch);
  }
  surfaceMesh = null;
}
function getSurfaceCenter() { return CONFIG.chargeOrigin.clone().add(state.surfaceOffset); }

// ═══ TILE SYSTEM ═══
// A tile is a small flat square at a sample point, tangent to the surface
// Returns { center (local), normal (local) } for arrow placement

function makeTile(center, normal, size) {
  // Build a small square oriented perpendicular to `normal` at `center`
  // Find two tangent vectors
  const up = Math.abs(normal.y) < 0.9 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
  const tangentU = new THREE.Vector3().crossVectors(normal, up).normalize();
  const tangentV = new THREE.Vector3().crossVectors(normal, tangentU).normalize();
  const half = size / 2;

  const p0 = center.clone().add(tangentU.clone().multiplyScalar(-half)).add(tangentV.clone().multiplyScalar(-half));
  const p1 = center.clone().add(tangentU.clone().multiplyScalar( half)).add(tangentV.clone().multiplyScalar(-half));
  const p2 = center.clone().add(tangentU.clone().multiplyScalar( half)).add(tangentV.clone().multiplyScalar( half));
  const p3 = center.clone().add(tangentU.clone().multiplyScalar(-half)).add(tangentV.clone().multiplyScalar( half));

  // Fill geometry (two triangles)
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    p0.x,p0.y,p0.z, p1.x,p1.y,p1.z, p2.x,p2.y,p2.z,
    p0.x,p0.y,p0.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z,
  ]), 3));
  geo.computeVertexNormals();

  // Edge geometry
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    p0.x,p0.y,p0.z, p1.x,p1.y,p1.z,
    p1.x,p1.y,p1.z, p2.x,p2.y,p2.z,
    p2.x,p2.y,p2.z, p3.x,p3.y,p3.z,
    p3.x,p3.y,p3.z, p0.x,p0.y,p0.z,
  ]), 3));

  return { geo, edgeGeo, center: center.clone(), normal: normal.clone() };
}

// Fibonacci sphere sampling (even distribution)
function fibonacciPoints(n, R) {
  const points = [];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (2 * i) / (n - 1);
    const r = Math.sqrt(1 - y * y);
    const theta = goldenAngle * i;
    const pos = new THREE.Vector3(r * Math.cos(theta) * R, y * R, r * Math.sin(theta) * R);
    const normal = pos.clone().normalize();
    points.push({ center: pos, normal });
  }
  return points;
}

function buildSphereTiles(R, nFib, tileSize) {
  const tiles = [];
  // Fibonacci samples
  const fibs = fibonacciPoints(nFib, R);
  fibs.forEach(p => tiles.push(makeTile(p.center, p.normal, tileSize)));
  // North and south poles
  tiles.push(makeTile(new THREE.Vector3(0, R, 0), new THREE.Vector3(0, 1, 0), tileSize));
  tiles.push(makeTile(new THREE.Vector3(0, -R, 0), new THREE.Vector3(0, -1, 0), tileSize));
  return tiles;
}

function buildCylinderTiles(R, H, nRings, perRing, capTiles, capRingFrac, tileSize, isPerp) {
  const tiles = [];

  // Barrel: evenly spaced rings
  for (let ri = 0; ri < nRings; ri++) {
    const t = (ri + 1) / (nRings + 1); // evenly space between endcaps
    const h = (t - 0.5) * H;
    for (let ai = 0; ai < perRing; ai++) {
      const angle = (ai / perRing) * Math.PI * 2;
      let center, normal;
      if (isPerp) {
        center = new THREE.Vector3(h, R * Math.cos(angle), R * Math.sin(angle));
        normal = new THREE.Vector3(0, Math.cos(angle), Math.sin(angle));
      } else {
        center = new THREE.Vector3(R * Math.cos(angle), h, R * Math.sin(angle));
        normal = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
      }
      tiles.push(makeTile(center, normal, tileSize));
    }
  }

  // Endcaps: ring of tiles at capRingFrac * R
  const capR = capRingFrac * R;
  for (const sign of [-1, 1]) {
    const hPos = sign * H / 2;
    for (let ai = 0; ai < capTiles; ai++) {
      const angle = (ai / capTiles) * Math.PI * 2;
      let center, normal;
      if (isPerp) {
        center = new THREE.Vector3(hPos, capR * Math.cos(angle), capR * Math.sin(angle));
        normal = new THREE.Vector3(sign, 0, 0);
      } else {
        center = new THREE.Vector3(capR * Math.cos(angle), hPos, capR * Math.sin(angle));
        normal = new THREE.Vector3(0, sign, 0);
      }
      tiles.push(makeTile(center, normal, tileSize));
    }
  }

  return tiles;
}

// Current tile data for arrows
let currentTiles = [];

function createGaussianSurface(type) {
  clearSurface();
  const center = getSurfaceCenter();
  const container = new THREE.Group();
  container.position.copy(center);

  // ── Clean transparent shell (no wireframe) ──
  const shellMat = new THREE.MeshBasicMaterial({
    color: CONFIG.green, transparent: true, opacity: 0.07,
    side: THREE.DoubleSide, depthWrite: false,
  });

  let shellGeo;
  if (type === 'sphere') {
    shellGeo = new THREE.SphereGeometry(CONFIG.sphereRadius, 32, 20);
  } else if (type === 'cylPar') {
    shellGeo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 32, 1, false);
  } else if (type === 'cylPerp') {
    shellGeo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 32, 1, false);
    shellGeo.rotateZ(Math.PI / 2);
  }

  container.add(new THREE.Mesh(shellGeo, shellMat));

  // ── Tiles ──
  let tiles;
  if (type === 'sphere') {
    tiles = buildSphereTiles(CONFIG.sphereRadius, CONFIG.sphereTileCount, CONFIG.tileSize);
  } else {
    const isPerp = type === 'cylPerp';
    tiles = buildCylinderTiles(CONFIG.cylinderRadius, CONFIG.cylinderHeight,
      CONFIG.cylBarrelRings, CONFIG.cylBarrelPerRing,
      CONFIG.cylCapTiles, CONFIG.cylCapRingRadius, CONFIG.tileSize, isPerp);
  }

  const tileFillMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const tileEdgeMat = new THREE.LineBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.5,
  });

  tiles.forEach(t => {
    container.add(new THREE.Mesh(t.geo, tileFillMat));
    container.add(new THREE.LineSegments(t.edgeGeo, tileEdgeMat));
  });

  currentTiles = tiles;
  surfaceGroup.add(container);

  // ── Symmetry indicators ──
  const symColor = CONFIG.cyan;
  const symMat = new THREE.MeshBasicMaterial({ color: symColor });

  if (type === 'sphere') {
    const plusGroup = new THREE.Group();
    plusGroup.name = 'symmetryIndicator';
    const armLen = 0.06, armRad = 0.005;
    const armGeo = new THREE.CylinderGeometry(armRad, armRad, armLen * 2, 8);
    plusGroup.add(new THREE.Mesh(armGeo, symMat));
    const xArm = new THREE.Mesh(armGeo.clone(), symMat);
    xArm.rotation.z = Math.PI / 2; plusGroup.add(xArm);
    const zArm = new THREE.Mesh(armGeo.clone(), symMat);
    zArm.rotation.x = Math.PI / 2; plusGroup.add(zArm);
    container.add(plusGroup);
  } else {
    const ext = CONFIG.cylinderHeight * 0.6;
    const dashLen = 0.05, gapLen = 0.035, dashRad = 0.008;
    const dashGeo = new THREE.CylinderGeometry(dashRad, dashRad, dashLen, 8);
    const axisGroup = new THREE.Group();
    axisGroup.name = 'symmetryIndicator';
    let pos = -ext;
    while (pos + dashLen <= ext) {
      const seg = new THREE.Mesh(dashGeo.clone(), symMat.clone());
      const mid = pos + dashLen / 2;
      if (type === 'cylPerp') {
        seg.rotation.z = Math.PI / 2; seg.position.set(mid, 0, 0);
      } else {
        seg.position.set(0, mid, 0);
      }
      axisGroup.add(seg);
      pos += dashLen + gapLen;
    }
    container.add(axisGroup);
  }

  // Invisible interaction mesh for raycasting drag
  let hitGeo;
  if (type === 'sphere') {
    hitGeo = new THREE.SphereGeometry(CONFIG.sphereRadius, 16, 12);
  } else if (type === 'cylPar') {
    hitGeo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 16);
  } else if (type === 'cylPerp') {
    hitGeo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 16);
    hitGeo.rotateZ(Math.PI / 2);
  }
  const hitMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
  surfaceMesh = new THREE.Mesh(hitGeo, hitMat);
  surfaceMesh.position.copy(center);
  surfaceMesh.name = 'gaussianSurface';
  surfaceGroup.add(surfaceMesh);
}

// ═══ E-FIELD ═══
function computeEField(worldPos) {
  const o = CONFIG.chargeOrigin;
  if (state.distribution === 'point') {
    const r = worldPos.clone().sub(o); const rm = r.length();
    if (rm < 0.02) return new THREE.Vector3();
    return r.normalize().multiplyScalar(1.0 / (rm * rm));
  } else if (state.distribution === 'line') {
    const dx = worldPos.x - o.x, dz = worldPos.z - o.z;
    const s = Math.sqrt(dx*dx + dz*dz);
    if (s < 0.02) return new THREE.Vector3();
    return new THREE.Vector3(dx/s, 0, dz/s).multiplyScalar(1.0 / s);
  }
  return new THREE.Vector3();
}

// ═══ ARROWS ═══
function clearArrows() {
  while (arrowGroup.children.length) {
    const ch = arrowGroup.children[0];
    ch.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    arrowGroup.remove(ch);
  }
}
function magToColor(t) {
  t = Math.max(0, Math.min(1, t));
  const c = new THREE.Color();
  if (t < 0.25) c.lerpColors(new THREE.Color(0x2040ff), new THREE.Color(0x20d0ff), t/0.25);
  else if (t < 0.5) c.lerpColors(new THREE.Color(0x20d0ff), new THREE.Color(0x40e080), (t-0.25)/0.25);
  else if (t < 0.75) c.lerpColors(new THREE.Color(0x40e080), new THREE.Color(0xf0e030), (t-0.5)/0.25);
  else c.lerpColors(new THREE.Color(0xf0e030), new THREE.Color(0xff3030), (t-0.75)/0.25);
  return c;
}

function updateArrows() {
  clearArrows();
  if (!state.distribution || !state.surface || currentTiles.length === 0) return;

  const center = getSurfaceCenter();

  // Compute E at center of each patch
  const data = currentTiles.map(p => {
    const wp = p.center.clone().add(center);
    const E = computeEField(wp);
    return { worldPos: wp, E, mag: E.length() };
  });

  const mags = data.map(d => d.mag).filter(m => m > 0.001);
  if (mags.length === 0) return;

  const minM = Math.min(...mags), maxM = Math.max(...mags);
  const mean = mags.reduce((a,b) => a+b, 0) / mags.length;
  const variance = mags.reduce((a,b) => a + (b-mean)**2, 0) / mags.length;
  const cv = mean > 0 ? Math.sqrt(variance) / mean : 1;
  state.isUniform = cv < CONFIG.uniformityThreshold;

  data.forEach(d => {
    if (d.mag < 0.001) return;
    const t = maxM > minM ? (d.mag - minM) / (maxM - minM) : 0.5;
    const tMapped = Math.pow(t, 0.4);
    const color = state.isUniform ? new THREE.Color(CONFIG.green) : magToColor(t);
    const len = state.isUniform
      ? (CONFIG.arrowMinLength + CONFIG.arrowMaxLength) * 0.5
      : CONFIG.arrowMinLength + (CONFIG.arrowMaxLength - CONFIG.arrowMinLength) * tMapped;
    const hLen = len * CONFIG.arrowHeadFraction;
    const hWid = hLen * CONFIG.arrowHeadWidthFraction;
    arrowGroup.add(new THREE.ArrowHelper(d.E.clone().normalize(), d.worldPos, len, color, hLen, hWid));
  });

  updateSurfaceAppearance();
  updateStatusBar();
}

function updateSurfaceAppearance() {
  // Update patch fill and edge opacity based on uniformity
  surfaceGroup.children.forEach(child => {
    if (child.isGroup) {
      child.children.forEach(c => {
        if (c.isMesh && c.material.visible !== false) {
          c.material.opacity = state.isUniform ? 0.1 : 0.04;
          c.material.color.setHex(CONFIG.green);
        }
        if (c.isLineSegments) {
          c.material.opacity = state.isUniform ? 0.5 : 0.3;
          c.material.color.setHex(CONFIG.green);
        }
      });
    }
  });
}

function updateStatusBar() {
  const bar = document.getElementById('status-bar');
  if (!state.distribution || !state.surface) { bar.textContent = ''; return; }
  bar.innerHTML = state.isUniform
    ? '<span style="color:#40e080">\u2726 E-field magnitude is constant on this surface \u2014 Gauss\'s Law simplifies!</span>'
    : '<span style="color:#7a9bb5">E-field magnitude varies across the surface. Try repositioning.</span>';
}

// ═══ VR PANEL ═══
const vrPanel = new THREE.Group();
vrPanel.position.set(-0.7, 1.4, -1.0); vrPanel.rotation.y = 0.35;
scene.add(vrPanel);
const panelButtons = [];
let panelBackdrop = null;

function createVRPanel() {
  // Backdrop: push it back with polygonOffset so text always wins
  const bgMat = new THREE.MeshBasicMaterial({
    color: 0x0c1428, transparent: true, opacity: 0.92, side: THREE.DoubleSide,
    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1,
  });
  const bg = new THREE.Mesh(new THREE.PlaneGeometry(0.95, 0.80), bgMat);
  bg.name = 'panelBackdrop';
  bg.renderOrder = 0;
  vrPanel.add(bg);
  panelBackdrop = bg;

  const borderMat = new THREE.LineBasicMaterial({ color: CONFIG.cyan, transparent: true, opacity: 0.6 });
  const border = new THREE.LineSegments(new THREE.EdgesGeometry(bg.geometry), borderMat);
  border.renderOrder = 1;
  vrPanel.add(border);

  const t = makePanelLabel('SYMMETRY EXPLORER', CONFIG.cyan, 32);
  t.scale.set(2.8,2.8,1); t.position.set(0, 0.33, 0.02); t.renderOrder = 2;
  vrPanel.add(t);
  const dl = makePanelLabel('DISTRIBUTION', 0xe0ecf4, 26);
  dl.scale.set(1.8,1.8,1); dl.position.set(0, 0.22, 0.02); dl.renderOrder = 2;
  vrPanel.add(dl);

  mkVRBtn(vrPanel, -0.16, 0.09, 'point', drawPointIcon, () => selectDistribution('point'));
  mkVRBtn(vrPanel, 0.16, 0.09, 'line', drawLineIcon, () => selectDistribution('line'));

  const sl = makePanelLabel('GAUSSIAN SURFACE', 0xe0ecf4, 26);
  sl.scale.set(1.8,1.8,1); sl.position.set(0, -0.06, 0.02); sl.renderOrder = 2;
  vrPanel.add(sl);

  mkVRBtn(vrPanel, -0.30, -0.20, 'sphere', drawSphereIcon, () => selectSurface('sphere'));
  mkVRBtn(vrPanel, 0.0, -0.20, 'cylPar', drawCylParIcon, () => selectSurface('cylPar'));
  mkVRBtn(vrPanel, 0.30, -0.20, 'cylPerp', drawCylPerpIcon, () => selectSurface('cylPerp'));
  mkVRBtn(vrPanel, 0, -0.34, 'reset', drawResetIcon, () => resetSurfacePosition());
}

function mkVRBtn(parent, x, y, id, drawFn, cb) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  drawFn(c);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  const m = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 0.14),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthTest: false }));
  m.position.set(x, y, 0.02); m.renderOrder = 2;
  m.userData = { id, callback: cb };
  parent.add(m); panelButtons.push(m);
}

// ═══ ICONS (high contrast, bold) ═══
function drawPointIcon(c) {
  const x = c.getContext('2d'); x.clearRect(0,0,256,256); x.scale(2,2);
  // Dark bg with bright border
  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(255,80,90,0.7)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();
  // Red charge
  x.fillStyle='#ff3040'; x.beginPath(); x.arc(64,60,18,0,Math.PI*2); x.fill();
  // White + sign
  x.strokeStyle='#ffffff'; x.lineWidth=4;
  x.beginPath(); x.moveTo(54,60); x.lineTo(74,60); x.moveTo(64,50); x.lineTo(64,70); x.stroke();
  // Radial field lines
  x.strokeStyle='rgba(255,100,100,0.5)'; x.lineWidth=2;
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;
    x.beginPath(); x.moveTo(64+Math.cos(a)*24,60+Math.sin(a)*24); x.lineTo(64+Math.cos(a)*44,60+Math.sin(a)*44); x.stroke();}
  // Label
  x.font='bold 16px Share Tech Mono'; x.fillStyle='#ffffff'; x.textAlign='center'; x.fillText('POINT',64,105);
}
function drawLineIcon(c) {
  const x = c.getContext('2d'); x.clearRect(0,0,256,256); x.scale(2,2);
  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(240,180,60,0.7)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();
  // Amber line
  x.strokeStyle='#f0a030'; x.lineWidth=5;
  x.beginPath(); x.moveTo(64,18); x.lineTo(64,95); x.stroke();
  // Arrows
  x.fillStyle='#f0b040';
  x.beginPath(); x.moveTo(64,10); x.lineTo(56,24); x.lineTo(72,24); x.fill();
  x.beginPath(); x.moveTo(64,103); x.lineTo(56,89); x.lineTo(72,89); x.fill();
  // Radial arrows
  x.strokeStyle='rgba(240,180,60,0.5)'; x.lineWidth=2;
  for(let y=38;y<=75;y+=18){
    x.beginPath();x.moveTo(72,y);x.lineTo(100,y);x.stroke();

  // Label
  x.font='bold 16px Share Tech Mono'; x.fillStyle='#ffffff'; x.textAlign='center'; x.fillText('LINE',64,118);
}
function drawSphereIcon(c) {

  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(80,230,140,0.7)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();

  x.strokeStyle='rgba(80,230,140,0.9)'; x.lineWidth=2.5;
  x.beginPath(); x.arc(64,56,34,0,Math.PI*2); x.stroke();
  x.strokeStyle='rgba(80,230,140,0.4)'; x.lineWidth=1.5;
  x.beginPath(); x.ellipse(64,56,34,11,0,0,Math.PI*2); x.stroke();
  x.beginPath(); x.ellipse(64,56,11,34,0,0,Math.PI*2); x.stroke();
  // Center dot
  x.fillStyle='#5ce0d2'; x.beginPath(); x.arc(64,56,3,0,Math.PI*2); x.fill();

  x.font='bold 14px Share Tech Mono'; x.fillStyle='#ffffff'; x.textAlign='center'; x.fillText('SPHERE',64,108);
}
function drawCylParIcon(c) {

  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(80,230,140,0.7)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();

function drawCylPerpIcon(c) {

  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(80,230,140,0.7)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();

  x.strokeStyle='rgba(80,230,140,0.9)'; x.lineWidth=2.5;

  x.beginPath(); x.ellipse(102,56,9,26,0,0,Math.PI*2); x.stroke();
  x.beginPath(); x.moveTo(26,30); x.lineTo(102,30); x.stroke();
  x.beginPath(); x.moveTo(26,82); x.lineTo(102,82); x.stroke();

  x.strokeStyle='rgba(92,224,210,0.6)'; x.setLineDash([4,4]); x.lineWidth=2;

  x.font='bold 14px Share Tech Mono'; x.fillStyle='#ffffff'; x.textAlign='center'; x.fillText('CYL \u22A5',64,108);
}
function drawResetIcon(c) {
  const x=c.getContext('2d'); x.clearRect(0,0,256,256); x.scale(2,2);
  x.fillStyle='rgba(12,22,44,0.95)'; x.roundRect(4,4,120,120,10); x.fill();
  x.strokeStyle='rgba(160,190,210,0.5)'; x.lineWidth=3; x.roundRect(4,4,120,120,10); x.stroke();
  // Reset arrow
  x.strokeStyle='rgba(200,220,240,0.8)'; x.lineWidth=4;
  x.beginPath(); x.arc(64,50,22,-Math.PI*0.3,Math.PI*1.3); x.stroke();
  x.fillStyle='rgba(200,220,240,0.8)';
  const a=-Math.PI*0.3, ax=64+Math.cos(a)*22, ay=50+Math.sin(a)*22;
  x.beginPath(); x.moveTo(ax+9,ay-3); x.lineTo(ax-3,ay-9); x.lineTo(ax+3,ay+7); x.fill();
  // Label
  x.font='bold 16px Share Tech Mono'; x.fillStyle='#ffffff'; x.textAlign='center'; x.fillText('RESET',64,100);
}

// ═══ VR CONTROLLERS ═══
const c0 = renderer.xr.getController(0), c1 = renderer.xr.getController(1);
scene.add(c0); scene.add(c1);
const cmf = new XRControllerModelFactory();
const g0 = renderer.xr.getControllerGrip(0); g0.add(cmf.createControllerModel(g0)); scene.add(g0);
const g1 = renderer.xr.getControllerGrip(1); g1.add(cmf.createControllerModel(g1)); scene.add(g1);
function mkRay() {
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(0,0,-3)]),
    new THREE.LineBasicMaterial({ color: CONFIG.cyan, transparent: true, opacity: 0.4 }));
}
c0.add(mkRay()); c1.add(mkRay());

const cState = { grabbing: null, prev: new THREE.Vector3(), panelGrab: null, panelPrev: new THREE.Vector3() };
const rc = new THREE.Raycaster(), tm = new THREE.Matrix4();

function getRay(ctrl) {
  tm.identity().extractRotation(ctrl.matrixWorld);
  rc.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  rc.ray.direction.set(0,0,-1).applyMatrix4(tm);
}

// Trigger = select buttons or grab surface
function onSS(e) {
  getRay(e.target);
  const bh = rc.intersectObjects(panelButtons);
  if (bh.length > 0) { bh[0].object.userData.callback(); return; }
  if (surfaceMesh) {
    const sh = rc.intersectObject(surfaceMesh);
    if (sh.length > 0) { cState.grabbing = e.target; cState.prev.setFromMatrixPosition(e.target.matrixWorld); }
  }
}
function onSE(e) { if (cState.grabbing === e.target) cState.grabbing = null; }

// Squeeze/grip = grab and move the panel
function onSqueezeStart(e) {
  getRay(e.target);
  if (panelBackdrop) {
    const ph = rc.intersectObject(panelBackdrop);
    if (ph.length > 0) {
      cState.panelGrab = e.target;
      cState.panelPrev.setFromMatrixPosition(e.target.matrixWorld);
      return;
    }
  }
  // Fallback: also allow squeeze to grab surface
  if (surfaceMesh) {
    const sh = rc.intersectObject(surfaceMesh);
    if (sh.length > 0) { cState.grabbing = e.target; cState.prev.setFromMatrixPosition(e.target.matrixWorld); }
  }
}
function onSqueezeEnd(e) {
  if (cState.panelGrab === e.target) cState.panelGrab = null;
  if (cState.grabbing === e.target) cState.grabbing = null;
}

c0.addEventListener('selectstart', onSS); c0.addEventListener('selectend', onSE);
c1.addEventListener('selectstart', onSS); c1.addEventListener('selectend', onSE);
c0.addEventListener('squeezestart', onSqueezeStart); c0.addEventListener('squeezeend', onSqueezeEnd);
c1.addEventListener('squeezestart', onSqueezeStart); c1.addEventListener('squeezeend', onSqueezeEnd);

// ═══ DESKTOP MOUSE ═══
const mouse = new THREE.Vector2(), mrc = new THREE.Raycaster();
let mDrag = false, mPlane = new THREE.Plane(), mOff = new THREE.Vector3();

renderer.domElement.addEventListener('pointerdown', e => {
  mouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
  mrc.setFromCamera(mouse, camera);
  if (surfaceMesh && mrc.intersectObject(surfaceMesh).length > 0) {
    mDrag = true; orbitControls.enabled = false;
    const cd = new THREE.Vector3(); camera.getWorldDirection(cd);
    mPlane.setFromNormalAndCoplanarPoint(cd, surfaceMesh.position);
    const ix = new THREE.Vector3(); mrc.ray.intersectPlane(mPlane, ix);
    mOff.copy(surfaceMesh.position).sub(ix);
  }
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!mDrag) return;
  mouse.set((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
  mrc.setFromCamera(mouse, camera);
  const ix = new THREE.Vector3();
  if (mrc.ray.intersectPlane(mPlane, ix)) {
    const np = ix.add(mOff);
    state.surfaceOffset.copy(np).sub(CONFIG.chargeOrigin);
    moveSurface(np); updateArrows();
  }
});
renderer.domElement.addEventListener('pointerup', () => { if (mDrag) { mDrag = false; orbitControls.enabled = true; } });

// ═══ MOVE / STATE ═══
function moveSurface(wp) {
  surfaceGroup.children.forEach(ch => ch.position.copy(wp));
}

window.selectDistribution = function(type) {
  state.distribution = type;
  document.querySelectorAll('#desktop-panel button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-'+type); if (btn) btn.classList.add('active');
  if (state.surface) { const sb = document.getElementById('btn-'+state.surface); if (sb) sb.classList.add('active'); }
  if (type === 'point') createPointCharge(); else if (type === 'line') createLineCharge();
  updateArrows();
};
window.selectSurface = function(type) {
  state.surface = type;
  document.querySelectorAll('#desktop-panel button').forEach(b => { if (!['btn-point','btn-line'].includes(b.id)) b.classList.remove('active'); });
  const btn = document.getElementById('btn-'+type); if (btn) btn.classList.add('active');
  if (state.distribution) { const db = document.getElementById('btn-'+state.distribution); if (db) db.classList.add('active'); }
  createGaussianSurface(type); updateArrows();
};
window.resetSurfacePosition = function() {
  state.surfaceOffset.set(0.6, 0.3, 0.4);
  if (state.surface) { createGaussianSurface(state.surface); updateArrows(); }
};

function updateVRDrag() {
  // Surface dragging
  if (cState.grabbing && surfaceMesh) {
    const cp = new THREE.Vector3().setFromMatrixPosition(cState.grabbing.matrixWorld);
    const delta = cp.clone().sub(cState.prev); cState.prev.copy(cp);
    state.surfaceOffset.add(delta);
    moveSurface(getSurfaceCenter()); updateArrows();
  }
  // Panel dragging
  if (cState.panelGrab) {
    const cp = new THREE.Vector3().setFromMatrixPosition(cState.panelGrab.matrixWorld);
    const delta = cp.clone().sub(cState.panelPrev); cState.panelPrev.copy(cp);
    vrPanel.position.add(delta);
  }
}

// ═══ ANIMATE ═══
const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  distributionGroup.children.forEach(ch => { if (ch.name === 'sceneLabel') ch.quaternion.copy(camera.quaternion); });
  if (state.isUniform) {
    surfaceGroup.children.forEach(ch => {
      if (ch.isGroup) ch.traverse(c => {
        // Pulse patch fills
        if (c.isMesh && c.material.visible !== false && c.name !== 'symmetryIndicator' && !c.parent?.name?.includes('symmetry')) {
          c.material.opacity = 0.06 + 0.06 * Math.sin(t * 3);
        }
      });
      // Pulse symmetry indicator group
      if (ch.isGroup) ch.children.forEach(c => {
        if (c.name === 'symmetryIndicator') {
          c.traverse(m => {
            if (m.isMesh && m.material) {
              m.material.color.setHSL(0.48, 0.8, 0.5 + 0.2 * Math.sin(t * 3));
            }
          });
        }
      });
    });
  }
  updateVRDrag();
  if (!renderer.xr.isPresenting) orbitControls.update();
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══ INIT ═══
createVRPanel();
selectDistribution('point');
selectSurface('sphere');
</script>
