<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gauss's Law Symmetry Explorer — VR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

      color: #b0c4d8;
    }
    canvas { display: block; }

    }
    #info .title { font-size: 22px; letter-spacing: 2px; }
    #info .sub { font-size: 13px; color: #7a9bb5; margin-top: 2px; }
    #desktop-panel {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);

<body>

<div id="info">

</div>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const CONFIG = {
  bgColor: 0x0a0e1a,
  gridColor: 0x1a2a3a,
  gridHighlight: 0x1e3348,
  cyan: 0x5ce0d2,
  amber: 0xf0a030,
  green: 0x40e080,
  red: 0xff3040,
  
  chargeOrigin: new THREE.Vector3(0, 1.3, -1.8),
  
  sphereRadius: 0.5,
  cylinderRadius: 0.35,
  cylinderHeight: 1.2,
  
  sphereSamples: 48,
  
  arrowMinLength: 0.06,
  arrowMaxLength: 0.28,
  arrowHeadFraction: 0.3,
  arrowHeadWidthFraction: 0.5,
  
  uniformityThreshold: 0.08,
};

// ═══ SCENE ═══
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.bgColor);
scene.fog = new THREE.FogExp2(CONFIG.bgColor, 0.06);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.xr.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const vrButton = VRButton.createButton(renderer);
document.getElementById('vr-button-container').appendChild(vrButton);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.target.set(0, 1.3, -1.8);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.update();

scene.add(new THREE.AmbientLight(0x334466, 0.6));
const dirLight = new THREE.DirectionalLight(0xaabbcc, 0.8);
dirLight.position.set(2, 4, 1);
scene.add(dirLight);
const pointLight = new THREE.PointLight(CONFIG.cyan, 0.4, 10);
pointLight.position.set(0, 2.5, -1.5);
scene.add(pointLight);

// ═══ ENVIRONMENT ═══
const gridHelper = new THREE.GridHelper(20, 40, CONFIG.gridHighlight, CONFIG.gridColor);
gridHelper.material.opacity = 0.4;
gridHelper.material.transparent = true;
scene.add(gridHelper);

function createAxisLine(dir, color, len) {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(len)
  ]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 }));
}
const axesGroup = new THREE.Group();
axesGroup.add(createAxisLine(new THREE.Vector3(1,0,0), 0xff4444, 3));
axesGroup.add(createAxisLine(new THREE.Vector3(0,1,0), 0x44ff44, 3));
axesGroup.add(createAxisLine(new THREE.Vector3(0,0,1), 0x4444ff, 3));
axesGroup.position.copy(CONFIG.chargeOrigin).setY(0);
scene.add(axesGroup);

// ═══ STATE ═══
const state = {
  distribution: null,
  surface: null,
  surfaceOffset: new THREE.Vector3(0.6, 0.3, 0.4),
  isUniform: false,
};

const distributionGroup = new THREE.Group();
scene.add(distributionGroup);
const surfaceGroup = new THREE.Group();
scene.add(surfaceGroup);
const arrowGroup = new THREE.Group();
scene.add(arrowGroup);

// ═══ PANEL LABEL (flat plane, NOT billboard sprite) ═══
function makePanelLabel(text, color, fontSize) {
  fontSize = fontSize || 24;
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 64);
  ctx.font = fontSize + 'px Share Tech Mono, monospace';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 32);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide, depthWrite: false });
  return new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.03), mat);
}

// ═══ SCENE LABEL (flat plane that tracks camera rotation) ═══
function makeSceneLabel(text, color, fontSize) {
  fontSize = fontSize || 32;
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 64);
  ctx.font = fontSize + 'px Share Tech Mono, monospace';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide, depthWrite: false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.075), mat);
  mesh.name = 'sceneLabel';
  return mesh;
}

// ═══ CHARGE DISTRIBUTIONS ═══
function clearDistribution() {
  while (distributionGroup.children.length) {
    const child = distributionGroup.children[0];
    child.traverse(c => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
    });
    distributionGroup.remove(child);
  }
}

function createPointCharge() {
  clearDistribution();
  const origin = CONFIG.chargeOrigin;
  
  // Red sphere
  const geo = new THREE.SphereGeometry(0.06, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color: CONFIG.red, emissive: CONFIG.red, emissiveIntensity: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(origin);
  distributionGroup.add(mesh);
  
  // White "+" on a small plane (will face camera via animate loop)
  const plusCanvas = document.createElement('canvas');
  plusCanvas.width = 64; plusCanvas.height = 64;
  const pctx = plusCanvas.getContext('2d');
  pctx.font = 'bold 48px Share Tech Mono, monospace';
  pctx.fillStyle = '#ffffff';
  pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
  pctx.fillText('+', 32, 30);
  const plusTexture = new THREE.CanvasTexture(plusCanvas);
  plusTexture.minFilter = THREE.LinearFilter;
  const plusMat = new THREE.MeshBasicMaterial({ map: plusTexture, transparent: true, side: THREE.DoubleSide, depthWrite: false });
  const plusMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.08), plusMat);
  plusMesh.position.copy(origin).add(new THREE.Vector3(0, 0, 0.065));
  plusMesh.name = 'sceneLabel';
  distributionGroup.add(plusMesh);
  
  // "+Q" label
  const label = makeSceneLabel('+Q', CONFIG.red);
  label.position.copy(origin).add(new THREE.Vector3(0, 0.14, 0));
  distributionGroup.add(label);
}

function createLineCharge() {
  clearDistribution();
  const lineLen = 6;
  const origin = CONFIG.chargeOrigin;
  
  // Clean line — no glow cylinder
  const geo = new THREE.CylinderGeometry(0.018, 0.018, lineLen, 12);
  const mat = new THREE.MeshStandardMaterial({ color: CONFIG.amber, emissive: CONFIG.amber, emissiveIntensity: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(origin.x, origin.y, origin.z);
  distributionGroup.add(mesh);
  
  // Arrow tips for infinite extent
  const arrowGeo = new THREE.ConeGeometry(0.04, 0.12, 8);
  const arrowMat = new THREE.MeshStandardMaterial({ color: CONFIG.amber, emissive: CONFIG.amber, emissiveIntensity: 0.4 });
  const topArrow = new THREE.Mesh(arrowGeo, arrowMat);
  topArrow.position.set(origin.x, origin.y + lineLen/2 + 0.06, origin.z);
  distributionGroup.add(topArrow);
  const bottomArrow = new THREE.Mesh(arrowGeo.clone(), arrowMat.clone());
  bottomArrow.position.set(origin.x, origin.y - lineLen/2 - 0.06, origin.z);
  bottomArrow.rotation.z = Math.PI;
  distributionGroup.add(bottomArrow);
  
  // λ label (flat plane, faces camera)
  const label = makeSceneLabel('\u03BB (infinite)', CONFIG.amber);
  label.scale.set(1.6, 1.6, 1);
  label.position.set(origin.x + 0.2, origin.y + 1.5, origin.z);
  distributionGroup.add(label);
}

// ═══ GAUSSIAN SURFACES ═══
let surfaceMesh = null;

function clearSurface() {
  while (surfaceGroup.children.length) {
    const child = surfaceGroup.children[0];
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
    surfaceGroup.remove(child);
  }
  surfaceMesh = null;
}

function getSurfaceCenter() {
  return CONFIG.chargeOrigin.clone().add(state.surfaceOffset);
}

function createGaussianSurface(type) {
  clearSurface();
  const center = getSurfaceCenter();
  let geo, wireGeo;
  
  const solidMat = new THREE.MeshStandardMaterial({
    color: CONFIG.green, transparent: true, opacity: 0.06,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const wireMat = new THREE.LineBasicMaterial({ color: CONFIG.green, transparent: true, opacity: 0.35 });
  
  if (type === 'sphere') {
    geo = new THREE.SphereGeometry(CONFIG.sphereRadius, 24, 16);
    wireGeo = new THREE.WireframeGeometry(new THREE.SphereGeometry(CONFIG.sphereRadius, 12, 8));
  } else if (type === 'cylPar') {
    geo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 24, 1, false);
    wireGeo = new THREE.WireframeGeometry(new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 12, 4, false));
  } else if (type === 'cylPerp') {
    geo = new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 24, 1, false);
    wireGeo = new THREE.WireframeGeometry(new THREE.CylinderGeometry(CONFIG.cylinderRadius, CONFIG.cylinderRadius, CONFIG.cylinderHeight, 12, 4, false));
    geo.rotateZ(Math.PI / 2);
    wireGeo.rotateZ(Math.PI / 2);
  }
  
  const solidMesh = new THREE.Mesh(geo, solidMat);
  solidMesh.position.copy(center);
  solidMesh.name = 'gaussianSurface';
  surfaceGroup.add(solidMesh);
  surfaceMesh = solidMesh;
  
  const wireframe = new THREE.LineSegments(wireGeo, wireMat);
  wireframe.position.copy(center);
  surfaceGroup.add(wireframe);
}

// ═══ SURFACE SAMPLING ═══
function fibonacciSphere(n, radius) {
  const points = [];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (2 * i) / (n - 1);
    const r = Math.sqrt(1 - y * y);
    const theta = goldenAngle * i;
    points.push(new THREE.Vector3(r * Math.cos(theta) * radius, y * radius, r * Math.sin(theta) * radius));
  }
  return points;
}

function cylinderSamplePoints(radius, height, isPerp) {
  const points = [], normals = [];
  const nAround = 10, nAlong = 5;
  
  for (let j = 0; j < nAlong; j++) {
    const t = (j / (nAlong - 1)) - 0.5;
    const h = t * height;
    for (let i = 0; i < nAround; i++) {
      const theta = (i / nAround) * Math.PI * 2;
      if (isPerp) {
        points.push(new THREE.Vector3(h, radius * Math.cos(theta), radius * Math.sin(theta)));
        normals.push(new THREE.Vector3(0, Math.cos(theta), Math.sin(theta)));
      } else {
        points.push(new THREE.Vector3(radius * Math.cos(theta), h, radius * Math.sin(theta)));
        normals.push(new THREE.Vector3(Math.cos(theta), 0, Math.sin(theta)));
      }
    }
  }
  
  const capRadii = [0, radius * 0.5, radius * 0.85];
  const capAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
  for (const sign of [-1, 1]) {
    const hPos = sign * height / 2;
    for (const cr of capRadii) {
      if (cr === 0) {
        if (isPerp) { points.push(new THREE.Vector3(hPos, 0, 0)); normals.push(new THREE.Vector3(sign, 0, 0)); }
        else { points.push(new THREE.Vector3(0, hPos, 0)); normals.push(new THREE.Vector3(0, sign, 0)); }
      } else {
        for (const angle of capAngles) {
          if (isPerp) { points.push(new THREE.Vector3(hPos, cr*Math.cos(angle), cr*Math.sin(angle))); normals.push(new THREE.Vector3(sign, 0, 0)); }
          else { points.push(new THREE.Vector3(cr*Math.cos(angle), hPos, cr*Math.sin(angle))); normals.push(new THREE.Vector3(0, sign, 0)); }
        }
      }
    }
  }
  return { points, normals };
}

function getSamplePoints() {
  if (!state.surface) return [];
  if (state.surface === 'sphere') {
    return fibonacciSphere(CONFIG.sphereSamples, CONFIG.sphereRadius).map(p => ({ localPos: p.clone(), normal: p.clone().normalize() }));
  }
  const isPerp = state.surface === 'cylPerp';
  const { points, normals } = cylinderSamplePoints(CONFIG.cylinderRadius, CONFIG.cylinderHeight, isPerp);
  return points.map((p, i) => ({ localPos: p.clone(), normal: normals[i].clone() }));
}

// ═══ E-FIELD ═══
function computeEField(worldPos) {
  const origin = CONFIG.chargeOrigin;
  if (state.distribution === 'point') {
    const r = worldPos.clone().sub(origin);
    const rMag = r.length();
    if (rMag < 0.02) return new THREE.Vector3(0, 0, 0);
    return r.normalize().multiplyScalar(1.0 / (rMag * rMag));
  } else if (state.distribution === 'line') {
    const dx = worldPos.x - origin.x;
    const dz = worldPos.z - origin.z;
    const s = Math.sqrt(dx * dx + dz * dz);
    if (s < 0.02) return new THREE.Vector3(0, 0, 0);
    return new THREE.Vector3(dx / s, 0, dz / s).multiplyScalar(1.0 / s);
  }
  return new THREE.Vector3(0, 0, 0);
}

// ═══ ARROWS ═══
function clearArrows() {
  while (arrowGroup.children.length) {
    const child = arrowGroup.children[0];
    child.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    arrowGroup.remove(child);
  }
}

function magnitudeToColor(t) {
  t = Math.max(0, Math.min(1, t));
  const color = new THREE.Color();
  if (t < 0.25) {
    color.lerpColors(new THREE.Color(0x2040ff), new THREE.Color(0x20d0ff), t / 0.25);
  } else if (t < 0.5) {
    color.lerpColors(new THREE.Color(0x20d0ff), new THREE.Color(0x40e080), (t - 0.25) / 0.25);
  } else if (t < 0.75) {
    color.lerpColors(new THREE.Color(0x40e080), new THREE.Color(0xf0e030), (t - 0.5) / 0.25);
  } else {
    color.lerpColors(new THREE.Color(0xf0e030), new THREE.Color(0xff3030), (t - 0.75) / 0.25);
  }
  return color;
}

function updateArrows() {
  clearArrows();
  if (!state.distribution || !state.surface) return;
  
  const center = getSurfaceCenter();
  const samplePoints = getSamplePoints();
  
  const fieldData = samplePoints.map(sp => {
    const worldPos = sp.localPos.clone().add(center);
    const E = computeEField(worldPos);
    return { worldPos, E, magnitude: E.length() };
  });
  
  if (fieldData.length === 0) return;
  
  const magnitudes = fieldData.map(d => d.magnitude).filter(m => m > 0.001);
  if (magnitudes.length === 0) return;
  
  const minMag = Math.min(...magnitudes);
  const maxMag = Math.max(...magnitudes);
  const meanMag = magnitudes.reduce((a, b) => a + b, 0) / magnitudes.length;
  const variance = magnitudes.reduce((a, b) => a + (b - meanMag) ** 2, 0) / magnitudes.length;
  const coeffVar = meanMag > 0 ? Math.sqrt(variance) / meanMag : 1;
  
  state.isUniform = coeffVar < CONFIG.uniformityThreshold;
  
  fieldData.forEach(d => {
    if (d.magnitude < 0.001) return;
    
    const t = maxMag > minMag ? (d.magnitude - minMag) / (maxMag - minMag) : 0.5;
    
    const color = state.isUniform ? new THREE.Color(CONFIG.green) : magnitudeToColor(t);
    
    // Length encodes magnitude: short=weak, long=strong
    const arrowLen = state.isUniform
      ? (CONFIG.arrowMinLength + CONFIG.arrowMaxLength) * 0.5
      : CONFIG.arrowMinLength + (CONFIG.arrowMaxLength - CONFIG.arrowMinLength) * t;
    
    const headLen = arrowLen * CONFIG.arrowHeadFraction;
    const headWidth = headLen * CONFIG.arrowHeadWidthFraction;
    const dir = d.E.clone().normalize();
    
    arrowGroup.add(new THREE.ArrowHelper(dir, d.worldPos, arrowLen, color, headLen, headWidth));
  });
  
  updateSurfaceGlow();
  updateStatusBar(coeffVar);
}

function updateSurfaceGlow() {
  surfaceGroup.children.forEach(child => {
    if (child.isMesh && child.name === 'gaussianSurface') {
      child.material.opacity = state.isUniform ? 0.12 : 0.06;
      child.material.emissive = new THREE.Color(state.isUniform ? CONFIG.green : 0x000000);
      child.material.emissiveIntensity = state.isUniform ? 0.15 : 0;
    }
    if (child.isLineSegments) {
      child.material.opacity = state.isUniform ? 0.6 : 0.35;
    }
  });
}

function updateStatusBar(coeffVar) {
  const bar = document.getElementById('status-bar');
  if (!state.distribution || !state.surface) { bar.textContent = ''; return; }
  bar.innerHTML = state.isUniform
    ? '<span style="color:#40e080">\u2726 E-field magnitude is constant on this surface \u2014 Gauss\'s Law simplifies!</span>'
    : '<span style="color:#7a9bb5">E-field magnitude varies across the surface. Try repositioning.</span>';
}

// ═══ VR PANEL ═══
const vrPanel = new THREE.Group();
vrPanel.position.set(-0.8, 1.4, -1.5);
vrPanel.rotation.y = 0.3;
scene.add(vrPanel);
const panelButtons = [];

function createVRPanel() {
  const backdropGeo = new THREE.PlaneGeometry(0.6, 0.55);
  const backdropMat = new THREE.MeshBasicMaterial({ color: 0x0a1020, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
  vrPanel.add(new THREE.Mesh(backdropGeo, backdropMat));
  
  const borderMat = new THREE.LineBasicMaterial({ color: CONFIG.cyan, transparent: true, opacity: 0.4 });
  vrPanel.add(new THREE.LineSegments(new THREE.EdgesGeometry(backdropGeo), borderMat));
  
  const title = makePanelLabel('SYMMETRY EXPLORER', CONFIG.cyan, 28);
  title.scale.set(1.8, 1.8, 1); title.position.set(0, 0.22, 0.005);
  vrPanel.add(title);
  
  const distLabel = makePanelLabel('DISTRIBUTION', 0x556b7a, 22);
  distLabel.scale.set(1.2, 1.2, 1); distLabel.position.set(0, 0.14, 0.005);
  vrPanel.add(distLabel);
  
  createVRButton(vrPanel, -0.1, 0.06, 'point', drawPointChargeIcon, () => selectDistribution('point'));
  createVRButton(vrPanel, 0.1, 0.06, 'line', drawLineChargeIcon, () => selectDistribution('line'));
  
  const surfLabel = makePanelLabel('GAUSSIAN SURFACE', 0x556b7a, 22);
  surfLabel.scale.set(1.2, 1.2, 1); surfLabel.position.set(0, -0.04, 0.005);
  vrPanel.add(surfLabel);
  
  createVRButton(vrPanel, -0.2, -0.12, 'sphere', drawSphereIcon, () => selectSurface('sphere'));
  createVRButton(vrPanel, 0.0, -0.12, 'cylPar', drawCylParIcon, () => selectSurface('cylPar'));
  createVRButton(vrPanel, 0.2, -0.12, 'cylPerp', drawCylPerpIcon, () => selectSurface('cylPerp'));
  
  createVRButton(vrPanel, 0, -0.22, 'reset', drawResetIcon, () => resetSurfacePosition());
}

function createVRButton(parent, x, y, id, drawFn, callback) {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  drawFn(canvas);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.08, 0.08),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
  );
  mesh.position.set(x, y, 0.005);
  mesh.userData = { id, callback };
  parent.add(mesh);
  panelButtons.push(mesh);
}

// ═══ ICON DRAWING ═══
function drawPointChargeIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255, 48, 64, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cx = 64, cy = 64;
  ctx.fillStyle = '#ff3040';
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx-7,cy); ctx.lineTo(cx+7,cy); ctx.moveTo(cx,cy-7); ctx.lineTo(cx,cy+7); ctx.stroke();
  ctx.strokeStyle = 'rgba(255, 48, 64, 0.35)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*20, cy+Math.sin(a)*20); ctx.lineTo(cx+Math.cos(a)*42, cy+Math.sin(a)*42); ctx.stroke();
  }
}

function drawLineChargeIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(240, 160, 48, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cx = 64;
  const g = ctx.createLinearGradient(cx,15,cx,113);
  g.addColorStop(0,'rgba(240,160,48,0.1)'); g.addColorStop(0.2,'rgba(240,160,48,1)');
  g.addColorStop(0.8,'rgba(240,160,48,1)'); g.addColorStop(1,'rgba(240,160,48,0.1)');
  ctx.strokeStyle = g; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(cx,15); ctx.lineTo(cx,113); ctx.stroke();
  ctx.fillStyle = '#f0a030';
  ctx.beginPath(); ctx.moveTo(cx,10); ctx.lineTo(cx-6,22); ctx.lineTo(cx+6,22); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx,118); ctx.lineTo(cx-6,106); ctx.lineTo(cx+6,106); ctx.fill();
  ctx.strokeStyle = 'rgba(240,160,48,0.3)'; ctx.lineWidth = 1.5;
  for (let y = 35; y <= 93; y += 29) {
    ctx.beginPath(); ctx.moveTo(cx+8,y); ctx.lineTo(cx+38,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-8,y); ctx.lineTo(cx-38,y); ctx.stroke();
  }
  ctx.font = '18px serif'; ctx.fillStyle = '#f0a030'; ctx.textAlign = 'center';
  ctx.fillText('\u03BB', 95, 40);
}

function drawSphereIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(64, 224, 128, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cx=64,cy=64,r=36;
  ctx.strokeStyle = 'rgba(64,224,128,0.7)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(64,224,128,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.3,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx,cy,r*0.3,r,0,0,Math.PI*2); ctx.stroke();
}

function drawCylParIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(64, 224, 128, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cx = 64;
  ctx.strokeStyle = 'rgba(64,224,128,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx,28,28,10,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx,100,28,10,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-28,28); ctx.lineTo(cx-28,100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+28,28); ctx.lineTo(cx+28,100); ctx.stroke();
  ctx.strokeStyle = 'rgba(64,224,128,0.25)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(cx,15); ctx.lineTo(cx,113); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = 'bold 16px sans-serif'; ctx.fillStyle = 'rgba(64,224,128,0.6)'; ctx.textAlign = 'center';
  ctx.fillText('\u2225', 105, 25);
}

function drawCylPerpIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(64, 224, 128, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cy = 64;

  ctx.beginPath(); ctx.ellipse(28,cy,10,28,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(100,cy,10,28,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28,cy-28); ctx.lineTo(100,cy-28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28,cy+28); ctx.lineTo(100,cy+28); ctx.stroke();

function drawResetIcon(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.roundRect(4, 4, 120, 120, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(122, 155, 181, 0.4)'; ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 120, 120, 8); ctx.stroke();
  const cx=64, cy=58;
  ctx.strokeStyle = 'rgba(122,155,181,0.7)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx,cy,25,-Math.PI*0.3,Math.PI*1.3); ctx.stroke();
  ctx.fillStyle = 'rgba(122,155,181,0.7)';
  const a=-Math.PI*0.3, ax=cx+Math.cos(a)*25, ay=cy+Math.sin(a)*25;
  ctx.beginPath(); ctx.moveTo(ax+8,ay-2); ctx.lineTo(ax-2,ay-8); ctx.lineTo(ax+2,ay+6); ctx.fill();
  ctx.font = '14px Share Tech Mono, monospace'; ctx.fillStyle = 'rgba(122,155,181,0.5)'; ctx.textAlign = 'center';
  ctx.fillText('RESET', cx, cy+42);
}

// ═══ VR CONTROLLERS ═══
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0); scene.add(controller1);

const controllerModelFactory = new XRControllerModelFactory();
const grip0 = renderer.xr.getControllerGrip(0);
grip0.add(controllerModelFactory.createControllerModel(grip0)); scene.add(grip0);
const grip1 = renderer.xr.getControllerGrip(1);
grip1.add(controllerModelFactory.createControllerModel(grip1)); scene.add(grip1);

function createControllerRay() {
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-3)]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: CONFIG.cyan, transparent: true, opacity: 0.4 }));
}
controller0.add(createControllerRay());
controller1.add(createControllerRay());

const controllerState = { grabbing: null, prevControllerPos: new THREE.Vector3() };
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

function getControllerRay(controller) {
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
}

function onSelectStart(event) {
  const controller = event.target;
  getControllerRay(controller);
  const buttonHits = raycaster.intersectObjects(panelButtons);
  if (buttonHits.length > 0) { buttonHits[0].object.userData.callback(); return; }
  if (surfaceMesh) {
    const surfaceHits = raycaster.intersectObject(surfaceMesh);
    if (surfaceHits.length > 0) {
      controllerState.grabbing = controller;
      controllerState.prevControllerPos.setFromMatrixPosition(controller.matrixWorld);
    }
  }
}
function onSelectEnd(event) { if (controllerState.grabbing === event.target) controllerState.grabbing = null; }

controller0.addEventListener('selectstart', onSelectStart); controller0.addEventListener('selectend', onSelectEnd);
controller1.addEventListener('selectstart', onSelectStart); controller1.addEventListener('selectend', onSelectEnd);
controller0.addEventListener('squeezestart', onSelectStart); controller0.addEventListener('squeezeend', onSelectEnd);
controller1.addEventListener('squeezestart', onSelectStart); controller1.addEventListener('squeezeend', onSelectEnd);

// ═══ DESKTOP MOUSE ═══
const mouse = new THREE.Vector2();
const mouseRaycaster = new THREE.Raycaster();
let isMouseDragging = false;
let mouseDragPlane = new THREE.Plane();
let mouseDragOffset = new THREE.Vector3();

renderer.domElement.addEventListener('pointerdown', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseRaycaster.setFromCamera(mouse, camera);
  if (surfaceMesh) {
    const hits = mouseRaycaster.intersectObject(surfaceMesh);
    if (hits.length > 0) {
      isMouseDragging = true; orbitControls.enabled = false;
      const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
      mouseDragPlane.setFromNormalAndCoplanarPoint(camDir, surfaceMesh.position);
      const intersection = new THREE.Vector3();
      mouseRaycaster.ray.intersectPlane(mouseDragPlane, intersection);
      mouseDragOffset.copy(surfaceMesh.position).sub(intersection);
    }
  }
});
renderer.domElement.addEventListener('pointermove', (e) => {
  if (!isMouseDragging) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseRaycaster.setFromCamera(mouse, camera);
  const intersection = new THREE.Vector3();
  if (mouseRaycaster.ray.intersectPlane(mouseDragPlane, intersection)) {
    const newPos = intersection.add(mouseDragOffset);
    state.surfaceOffset.copy(newPos).sub(CONFIG.chargeOrigin);
    moveSurface(newPos); updateArrows();
  }
});
renderer.domElement.addEventListener('pointerup', () => {
  if (isMouseDragging) { isMouseDragging = false; orbitControls.enabled = true; }
});

// ═══ STATE MANAGEMENT ═══
function moveSurface(worldPos) {
  surfaceGroup.children.forEach(child => child.position.copy(worldPos));
}

window.selectDistribution = function(type) {
  state.distribution = type;
  document.querySelectorAll('#desktop-panel button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + type);
  if (btn) btn.classList.add('active');
  if (state.surface) { const sb = document.getElementById('btn-' + state.surface); if (sb) sb.classList.add('active'); }
  if (type === 'point') createPointCharge();
  else if (type === 'line') createLineCharge();
  updateArrows();
};

window.selectSurface = function(type) {
  state.surface = type;
  document.querySelectorAll('#desktop-panel button').forEach(b => {
    if (!['btn-point', 'btn-line'].includes(b.id)) b.classList.remove('active');
  });
  const btn = document.getElementById('btn-' + type);
  if (btn) btn.classList.add('active');
  if (state.distribution) { const db = document.getElementById('btn-' + state.distribution); if (db) db.classList.add('active'); }
  createGaussianSurface(type); updateArrows();
};

window.resetSurfacePosition = function() {
  state.surfaceOffset.set(0.6, 0.3, 0.4);
  if (state.surface) { createGaussianSurface(state.surface); updateArrows(); }
};

// ═══ VR DRAG UPDATE ═══
function updateVRDragging() {
  if (!controllerState.grabbing || !surfaceMesh) return;
  const controller = controllerState.grabbing;
  const currentPos = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
  const delta = currentPos.clone().sub(controllerState.prevControllerPos);
  controllerState.prevControllerPos.copy(currentPos);
  state.surfaceOffset.add(delta);
  moveSurface(getSurfaceCenter()); updateArrows();
}

// ═══ ANIMATE ═══
const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  
  // Scene labels face camera (NOT panel labels — those stay fixed to panel)
  distributionGroup.children.forEach(child => {
    if (child.name === 'sceneLabel') child.quaternion.copy(camera.quaternion);
  });
  
  // Pulse surface when uniform
  if (state.isUniform) {
    surfaceGroup.children.forEach(child => {
      if (child.isMesh && child.name === 'gaussianSurface') {
        child.material.opacity = 0.08 + 0.06 * Math.sin(t * 3);
        child.material.emissiveIntensity = 0.1 + 0.08 * Math.sin(t * 3);
      }
    });
  }
  
  updateVRDragging();
  if (!renderer.xr.isPresenting) orbitControls.update();
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══ INIT ═══
createVRPanel();
selectDistribution('point');
selectSurface('sphere');

</script>
